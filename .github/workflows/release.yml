name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6

      - name: Validate release tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Import Developer ID certificate
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/quench-signing.keychain-db"
          echo "$CERTIFICATE_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security create-keychain -p actions "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p actions "$KEYCHAIN"
          security import "$RUNNER_TEMP/certificate.p12" -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k actions "$KEYCHAIN"
          security list-keychain -d user -s "$KEYCHAIN"

      - name: Build signed app
        env:
          SIGN_IDENTITY: ${{ secrets.APPLE_DEVELOPER_IDENTITY }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: VERSION="$VERSION" ./scripts/package-app.sh

      - name: Submit to Apple notarization
        env:
          APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ditto -c -k --sequesterRsrc --keepParent dist/Quench.app "$RUNNER_TEMP/Quench.zip"
          xcrun notarytool submit "$RUNNER_TEMP/Quench.zip" --wait \
            --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" --team-id "$APPLE_TEAM_ID"
          xcrun stapler staple dist/Quench.app
          xcrun stapler validate dist/Quench.app
          spctl --assess --type execute --verbose=2 dist/Quench.app

      - name: Archive and checksum
        run: |
          ./scripts/archive-app.sh
          ./scripts/verify-release-readiness.sh

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/Quench.zip dist/Quench.zip.sha256 \
            --verify-tag --generate-notes --title "Quench $VERSION"
