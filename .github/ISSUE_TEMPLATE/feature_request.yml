name: Feature request
description: Propose a product, source, research, or accessibility improvement.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: need
    attributes:
      label: User need
      description: What problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
    validations:
      required: true
  - type: textarea
    id: privacy
    attributes:
      label: Privacy and accuracy impact
      description: What data is involved, and how should uncertainty be communicated?
